<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
</head>
<body>
    <h1>Test Page</h1>
    <button id="testBtn">Click Me</button>
    <div id="output"></div>

    <script>
        console.log('Testing...');
        document.getElementById('testBtn').addEventListener('click', () => {
            alert('Button clicked!');
            document.getElementById('output').textContent = 'Button was clicked!';
        });
    </script>
</body>
</html>
